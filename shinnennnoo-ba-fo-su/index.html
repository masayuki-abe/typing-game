<!DOCTYPE html>
<html lang="jp">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="/script.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="game-container">
    <div class="game-container-left">
      <figure class="card-image-wrap">
        <p class="common-title font-en">DREW</p>
        <img src="" class="card-image">
      </figure>
    </div>
    <div class="game-container-right">
      <div class="card-info-area">
        <p class="common-title font-en">ANALYSIS</p>
        <div class="common-flex-container">
          <p class="card-attribute"></p>
          <p class="card-info"></p>
        </div>
        <p class="card-name"></p>
        <div class="common-flex-container common-flex-container-gap2em">
          <p class="card-level"></p>
          <p class="card-atk font-en"></p>
          <p class="card-def font-en"></p>
        </div>
        <p class="card-text"></p>
      </div>
      <div class="card-input-area">
        <p class="common-title font-en">INPUT TERMINAL</p>
        <p class="card-ruby"></p>
        <p class="card-romaji"></p>
        <div class="feedback-msg"></div>
        <input type="text" class="typing-input">
      </div>
    </div>
  </div>
</body>
</html>
